# Schema for rich (spec version 0.2.0) dbdict.yaml documents.
#
# The rich format types columns in DuckDB's native type domain (free-form
# type expressions plus a `typedef:` alias layer) instead of the legacy
# coarse vocabulary; `schema.yaml` remains the schema for legacy 0.1.0
# documents. `validate_spec::load` selects between the two by peeking at
# `$version`.
#
# Written in the quarto-cli YAML schema dialect understood by the
# quarto-yaml-validation crate. See site/spec.md for the prose specification.
#
# NOTE: several subschemas (the column descriptive keys, relationships,
# glossary, version, the name anyOf blocks) are duplicated from schema.yaml —
# an edit to a shared shape must be made in BOTH files.
#
# Conventions in this schema:
#   - All objects are closed (`closed: true`): unknown keys are rejected.
#     This is appropriate while the spec is pre-1.0; bump the schema with the
#     spec when new fields are added.
#   - The column subschema is a single flat object. The legacy coarse-type
#     rules (S07/S08/S12–S14: `values` required for enums, `units` only on
#     quantities, …) do NOT run for rich documents — they are written against
#     the coarse vocabulary this format replaces, and their duckdb-type
#     rework is pending. The descriptive keys (`values`/`range`/`examples`/
#     `units`/`time_zone`) are kept as optional metadata meanwhile.
#   - Cross-table / cross-field semantics (foreign-key targets really exist,
#     `join` expressions parse, `conflicts` columns appear in both sides) are
#     out of scope for the schema and belong in a separate validator.

object:
  closed: true
  required: ["$version"]
  properties:

    "$version":
      enum: [0.2.0]
      description: >
        Version of the dbdict.yaml spec this document conforms to.

    # Optional in the schema (its absence is a warning, not an error — see
    # S09 in validate_spec.rs); a URL where readers can learn about the format.
    "$learn_more": string

    # Descriptive keys for the whole dataset. `name` is a display title with
    # no uniqueness constraints; all three are optional.
    name: string
    description: string
    details: string

    # Global type aliases: `name → native DuckDB type expression`. An alias
    # may be used as a column `type:` or inside another typedef's expression
    # (compounding). Cycle/duplicate detection and expression validity are the
    # validator's job, not the schema's.
    typedef:
      object:
        additionalProperties: string

    # Where the data lives: one dictionary describes one DuckDB database
    # (unlike the legacy format's per-table parquet files). `file` is resolved
    # relative to the dictionary; an absolute path is used as-is. Each dict
    # table is matched to the database relation of the same name.
    source:
      object:
        closed: true
        required: [duckdb]
        properties:
          duckdb:
            object:
              closed: true
              required: [file]
              properties:
                file: string

    tables:
      arrayOf:
        object:
          closed: true
          required: [name, columns]
          properties:

            # `anyOf: [string, null]` lets an empty/null name through to the
            # semantic layer, where S11 reports it with a clear message; the
            # YAML parser collapses `""` to null. Uniqueness is S10's job.
            name:
              anyOf:
                - string
                - null
            # Optional human-facing display name.
            label: string
            description: string
            details: string

            # Table-scoped type aliases; a name here shadows the same global
            # name for this table's columns.
            typedef:
              object:
                additionalProperties: string

            columns:
              arrayOf:
                object:
                  closed: true
                  required: [name]
                  properties:
                    # `anyOf: [string, null]` lets an empty/null name through
                    # to the semantic layer, where S11 reports it with a clear
                    # message; the YAML parser collapses `""` to null.
                    name:
                      anyOf:
                        - string
                        - null
                    # Optional human-facing display name.
                    label: string
                    description: string
                    details: string
                    display:
                      enum: [restricted]
                    units: string
                    # Shape is checked semantically (S15); the legacy
                    # placement rule (S14) does not run for rich documents
                    time_zone: string
                    # A free-form DuckDB type expression (`DECIMAL(18, 4)`,
                    # `STRUCT(city VARCHAR, postcode INTEGER)`, …) or the name
                    # of a `typedef:` alias. Whether the expression is *valid*
                    # is DuckDB's call, made when the dictionary is
                    # instantiated in a scratch database (validate-meta).
                    type: string
                    values:
                      anyOf:
                        - arrayOf:                  # [M, F, U]
                            anyOf:
                              - string
                              - number
                              - boolean
                        - object:                   # {M: Male, F: Female, ...}
                            additionalProperties: string
                    range:
                      arrayOf:
                        schema:
                          anyOf:
                            - number
                            - string
                        length: 2
                    constraints:
                      arrayOf:
                        enum: [primary_key, foreign_key, required, unique]
                    examples:
                      arrayOf: any

    relationships:
      arrayOf:
        object:
          closed: true
          required: [cardinality, join]
          properties:
            description: string
            cardinality:
              enum: [one-to-one, one-to-many, many-to-one]
            join: string
            conflicts:
              arrayOf: string

    glossary:
      object:
        additionalProperties: string

    # The dictionary's own version. S17 enforces exactly one key +
    # ISO-8601 valid dates
    version:
      object:
        closed: true
        properties:
          number:
            anyOf:
              - string
              - number
          date: string
          hash: string
