# expected: S02
# The relationship references `category` but that table doesn't exist; the
# defined table is `food_category`. S03 would also fire on `category.id`
# but S02 should be present.

$version: "0.1.0"

tables:
  food:
    source:
      parquet: food.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
      - name: food_category_id
        type: number(id)
        constraints: [foreign_key]

  food_category:
    source:
      parquet: food_category.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]

relationships:
  - cardinality: many-to-one
    join: food.food_category_id = category.id
