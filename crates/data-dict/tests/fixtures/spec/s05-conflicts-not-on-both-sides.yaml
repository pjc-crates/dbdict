# expected: S05
# `conflicts: [amount]` claims `amount` appears in both `food` and
# `food_nutrient`, but `food` has no `amount` column.

$version: "0.1.0"

tables:
  food:
    source:
      parquet: food.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]

  food_nutrient:
    source:
      parquet: food_nutrient.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
      - name: food_id
        type: number(id)
        constraints: [foreign_key]
      - name: amount
        type: number(quantity)

relationships:
  - cardinality: one-to-many
    join: food.id = food_nutrient.food_id
    conflicts: [amount]
