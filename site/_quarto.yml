project:
  type: website
  output-dir: _site

website:
  title: "dbdict.yaml"
  site-url: https://pjc-crates.github.io/dbdict/
  repo-url: https://github.com/pjc-crates/dbdict
  description: >
    A DuckDB-native YAML data dictionary specification for describing
    collections of related tables — their columns, exact types, constraints,
    relationships, and domain vocabulary.
  llms-txt: true
  navbar:
    left:
      - href: index.md
        text: Overview
      - href: spec.md
        text: Specification
      - href: validation.md
        text: Validation
      - href: examples/index.qmd
        text: Examples
    right:
      - icon: github
        href: https://github.com/pjc-crates/dbdict
        aria-label: GitHub

format:
  html:
    theme: cosmo
    toc: true
